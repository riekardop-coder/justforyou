<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>riekardo</title>
</head><title>Will you be my girlfried?</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #333;
      text-align: center;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      background: white;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-width: 400px;
      position: relative;
    }
    h1 {
      color: #e91e63;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2em;
      margin: 20px 0;
    }
    .buttons {
      margin-top: 30px;
    }
    button {
      padding: 12px 30px;
      margin: 10px;
      border: none;
      border-radius: 50px;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s;
    }
    #yesBtn {
      background: #e91e63;
      color: white;
    }
    #noBtn {
      background: #ddd;
      color: #333;
    }
    #yesBtn:hover { transform: scale(1.1); }
    .hearts {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hearts">💕 ❤️ 💕</div>
    <h1>Hey Joyce💖</h1>
    <p>I know I have asked this before but 
         <strong>WILL YOU BE MY GIRLFRIEND?</strong>
    </p>
     
    <div class="buttons">
      <button id="yesBtn">Yes, I'd love to! ❤️</button>
      <button id="noBtn">No</button>
    </div>
  </div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    let noClickCount = 0;

    yesBtn.addEventListener('click', () => {
      document.body.innerHTML = `
        <div style="height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#ff9a9e,#fad0c4);flex-direction:column;color:white;font-size:2em;text-align:center;">
          <h1>YAYYYY! 🎉💕</h1>
          <p>You just made my day (I love you)!</p>
          <p>Can't wait to meet you my baby girl ❤️</p>
          <div style="font-size:4em;margin:20px;">🥳💃🕺</div>
        </div>`;
    });

    noBtn.addEventListener('click', () => {
      noClickCount++;
      
      if (noClickCount === 1) {
        noBtn.textContent = "Are you sure? 😢";
      } else if (noClickCount === 2) {
        noBtn.textContent = "Okay🥺";
      } 
    });
  </script>
</body>
</html>
